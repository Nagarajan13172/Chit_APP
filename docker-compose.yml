services:
  postgres:
    image: postgres:16
    container_name: chit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chit_user
      POSTGRES_PASSWORD: chit_pass
      POSTGRES_DB: chit_db
    ports:
      - "5433:5432"
    volumes:
      - chit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chit_user -d chit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chit_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chit.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - chit_pgadmin:/var/lib/pgadmin
      # Pre-registers the "Chit DB" connection (you only enter the DB password once).
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  chit_pgdata:
  chit_pgadmin:
